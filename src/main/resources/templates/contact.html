<!doctype html>
<html lang="en"  xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spring Security</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<div class="container py-5">
  <div class="row">
    <div class="col-lg-6 mx-auto rounded border p-4">
      <h2 class="text-center mb-4">Register</h2>
      <hr />
      <div th:if="${successMessage}" class="alert alert-success alert-dimissible fade show" role="alert">
        <strong th:text="${successMessage}"></strong>
        <button type="button" class="btn-close" data-bs-dimiss="alert" aria-label="Close"></button>
      </div>

      <div th:if="${errorMessage}" class="alert alert-success alert-dimissible fade show" role="alert">
        <strong th:text="${errorMessage}"></strong>
        <button type="button" class="btn-close" data-bs-dimiss="alert" aria-label="Close"></button>
      </div>
      <form method="post" th:object="${contactDto}" >

        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Name*</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" th:field="*{name}">
            <p th:if="${#fields.hasErrors('name')}" class="text-danger" th:errors="*{name}"></p>
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Email*</label>
          <div class="col-sm-8">
            <input type="email" class="form-control" th:field="*{email}">
            <p th:if="${#fields.hasErrors('email')}" class="text-danger" th:errors="*{email}"></p>
          </div>
        </div>

  


        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Subject*</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" th:field="*{subject}">
            <p th:if="${#fields.hasErrors('subject')}" class="text-danger" th:errors="*{subject}"></p>
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Message*</label>
          <div class="col-sm-8">
            <textarea  class="form-control" th:field="*{message}" rows="5"></textarea>
            <p th:if="${#fields.hasErrors('message')}" class="text-danger" th:errors="*{message}"></p>
          </div>
        </div>

      

      

        <div class="row mb-3">
          <div class="offset-sm-4 col-sm-4 d-grid">
            <button type="submit" class="btn btn-primary">Submit</button>
          </div>
      
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
